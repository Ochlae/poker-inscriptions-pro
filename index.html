<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pexiora Poker Club - Inscription</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

.logo {
    width: 200px;
    margin-bottom: 20px;
}

h1 {
    color: gold;
}

input {
    padding: 10px;
    width: 70%;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.inscrire {
    background: green;
    color: white;
}

.desinscrire {
    background: red;
    color: white;
}

.liste {
    margin-top: 20px;
    text-align: left;
    background: #222;
    padding: 15px;
    border-radius: 10px;
}

.compteur {
    font-size: 20px;
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">

<img src="file:///C:/Users/grand/OneDrive/Documents/Projet%20inscriptions/logo.png" class="logo">


<h1>PEXIORA POKER CLUB</h1>

<div class="compteur" id="compteur">0 / 64 inscrits</div>

<input type="text" id="nom" placeholder="Votre pseudo">

<br>

<button class="inscrire" onclick="inscrire()">Je m'inscris</button>
<button class="desinscrire" onclick="desinscrire()">Je me désinscris</button>

<div class="liste" id="liste"></div>

</div>

<script>

let joueurs = JSON.parse(localStorage.getItem("joueurs")) || [];

function sauvegarder() {
    localStorage.setItem("joueurs", JSON.stringify(joueurs));
}

function afficher() {
    let listeHTML = "";
    joueurs.forEach((j, i) => {
        listeHTML += (i+1) + ". " + j + "<br>";
    });

    document.getElementById("liste").innerHTML = listeHTML;
    document.getElementById("compteur").innerText = joueurs.length + " / 64 inscrits";
}

function inscrire() {
    let nom = document.getElementById("nom").value.trim();

    if (nom === "") {
        alert("Entre un pseudo !");
        return;
    }

    if (joueurs.includes(nom)) {
        alert("Déjà inscrit !");
        return;
    }

    if (joueurs.length >= 72) {
        alert("Complet !");
        return;
    }

    joueurs.push(nom);
    sauvegarder();
    afficher();
}

function desinscrire() {
    let nom = document.getElementById("nom").value.trim();

    joueurs = joueurs.filter(j => j !== nom);

    sauvegarder();
    afficher();
}

afficher();

</script>

</body>
</html>
