<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pexiora Poker Club - Inscriptions PRO</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
}
.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}
.logo {
    width: 180px;
    margin-bottom: 15px;
}
h1 {
    color: gold;
}
input {
    padding: 12px;
    width: 75%;
    border-radius: 6px;
    border: none;
    margin: 10px;
}
button {
    padding: 12px 18px;
    margin: 6px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}
.inscrire {
    background: green;
    color: white;
}
.desinscrire {
    background: red;
    color: white;
}
.liste {
    margin-top: 20px;
    text-align: left;
    background: #222;
    padding: 15px;
    border-radius: 10px;
}
.attente {
    margin-top: 20px;
    text-align: left;
    background: #332200;
    padding: 15px;
    border-radius: 10px;
}
.compteur {
    font-size: 22px;
    margin: 15px 0;
    color: gold;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>PEXIORA POKER CLUB</h1>
<h2>Inscriptions tournoi</h2>

<div class="compteur" id="compteur">Chargement...</div>

<input type="text" id="nom" placeholder="Votre prénom ou pseudo">

<br>

<button class="inscrire" onclick="inscrire()">Je m'inscris</button>
<button class="desinscrire" onclick="desinscrire()">Je me désinscris</button>

<h2>Liste des inscrits</h2>
<div class="liste" id="liste"></div>

<h2>Liste d'attente</h2>
<div class="attente" id="attente"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDANUdOf2ui5gfuvdOMPfOX_SVaEcoT7-8",
  authDomain: "pexiora-poker-inscriptrions.firebaseapp.com",
  databaseURL: "https://pexiora-poker-inscriptrions-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pexiora-poker-inscriptrions",
  storageBucket: "pexiora-poker-inscriptrions.firebasestorage.app",
  messagingSenderId: "663409779372",
  appId: "1:663409779372:web:5aeb38e5cc677385887509"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const joueursRef = database.ref("joueurs");

let joueurs = [];

joueursRef.on("value", (snapshot) => {
    joueurs = snapshot.val() || [];
    afficher();
});

function nettoyerNom(nom) {
    return nom.trim();
}

function inscrire() {
    let nom = nettoyerNom(document.getElementById("nom").value);

    if (nom === "") {
        alert("Entre ton prénom ou ton pseudo.");
        return;
    }

    if (joueurs.includes(nom)) {
        alert("Tu es déjà inscrit.");
        return;
    }

    joueurs.push(nom);
    joueursRef.set(joueurs);
    document.getElementById("nom").value = "";
}

function desinscrire() {
    let nom = nettoyerNom(document.getElementById("nom").value);

    if (nom === "") {
        alert("Entre ton prénom ou ton pseudo pour te désinscrire.");
        return;
    }

    joueurs = joueurs.filter(j => j !== nom);
    joueursRef.set(joueurs);
    document.getElementById("nom").value = "";
}

function afficher() {
    let inscrits = joueurs.slice(0, 64);
    let attente = joueurs.slice(64, 72);

    document.getElementById("compteur").innerText =
        inscrits.length + " / 64 inscrits" +
        (attente.length > 0 ? " — " + attente.length + " en attente" : "");

    let listeHTML = "";
    inscrits.forEach((j, i) => {
        listeHTML += (i + 1) + ". " + j + "<br>";
    });

    document.getElementById("liste").innerHTML =
        listeHTML || "Aucun inscrit pour le moment.";

    let attenteHTML = "";
    attente.forEach((j, i) => {
        attenteHTML += (i + 1) + ". " + j + "<br>";
    });

    document.getElementById("attente").innerHTML =
        attenteHTML || "Aucune personne en attente.";
}
</script>

</body>
</html>
