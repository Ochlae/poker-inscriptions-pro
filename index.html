<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png"> 
<meta charset="UTF-8">
<title>Pexiora Poker Club - Inscriptions</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #0b1a0b;
    color: white;
    text-align: center;
    margin: 0;
}
.container {
    max-width: 600px;
    margin: auto;
    padding: 15px;
}
.logo {
    width: 140px;
}
h1 { color: gold; }

input, button {
    width: 90%;
    padding: 14px;
    margin: 6px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

.inscrire { background: green; color: white; }
.desinscrire { background: red; color: white; }

.compteur {
    margin: 15px;
    font-size: 18px;
    color: gold;
}

.liste { background: #1a2a1a; padding: 10px; border-radius: 10px; }
.attente { background: #3a2a00; padding: 10px; border-radius: 10px; }
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>PEXIORA POKER CLUB</h1>

<div id="compteur"></div>

<input id="nom" placeholder="Votre pseudo">

<button class="inscrire" onclick="inscrire()">Je m'inscris</button>
<button class="desinscrire" onclick="desinscrire()">Je me désinscris</button>

<h3>Inscrits</h3>
<div id="liste"></div>

<h3>Attente</h3>
<div id="attente"></div>
<div style="margin-top:30px; border-top:1px solid #555; padding-top:20px;">
  <h3>Admin</h3>

  <input type="password" id="adminCode" placeholder="Code admin">

  <button onclick="resetTournoi()" style="background:#444; color:white;">
    Réinitialiser le tournoi
  </button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDANUdOf2ui5gfuvdOMPfOX_SVaEcoT7-8",
  authDomain: "pexiora-poker-inscriptrions.firebaseapp.com",
  databaseURL: "https://pexiora-poker-inscriptrions-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pexiora-poker-inscriptrions"
};

firebase.initializeApp(firebaseConfig);
const ref = firebase.database().ref("joueurs");

const PLACES = 64;
const MAX = 72;

let joueurs = [];

ref.on("value", snap => {
    joueurs = snap.val() || [];
    afficher();
});

function norm(n){ return n.trim().toLowerCase(); }

function inscrire(){
    let nom = document.getElementById("nom").value.trim();
    if(!nom) return alert("Entre un pseudo");

    if(joueurs.some(j => norm(j) === norm(nom)))
        return alert("Déjà inscrit");

    if(joueurs.length >= MAX)
        return alert("Complet");

    joueurs.push(nom);
    ref.set(joueurs);
    document.getElementById("nom").value="";
}

function desinscrire(){
    let nom = document.getElementById("nom").value.trim();
    joueurs = joueurs.filter(j => norm(j)!==norm(nom));
    ref.set(joueurs);
}

function afficher(){
    let ins = joueurs.slice(0, PLACES);
    let att = joueurs.slice(PLACES);

    document.getElementById("compteur").innerText =
        ins.length + "/" + PLACES + " inscrits";

    document.getElementById("liste").innerHTML =
        ins.map((j,i)=>(i+1)+". "+j).join("<br>");

    document.getElementById("attente").innerHTML =
        att.map((j,i)=>(i+1)+". "+j).join("<br>");
}
    function resetTournoi() {
  const code = document.getElementById("adminCode").value;

  if (code === "pexiora2026" || code === "julien2026") {

    if (confirm("Réinitialiser le tournoi ?")) {

      firebase.database().ref("joueurs").set([]);
      alert("Tournoi réinitialisé");

    }

  } else {
    alert("Code admin incorrect");
  }
}
</script>

</body>
</html>
