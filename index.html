<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pexiora Poker Club</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
    font-family: Arial;
    background: #0b1a0b;
    color: white;
    text-align: center;
}
.container {
    max-width: 600px;
    margin: auto;
    padding: 10px;
}
.logo { width: 120px; }
input, button {
    width: 90%;
    padding: 14px;
    margin: 6px;
    border-radius: 8px;
    border: none;
}
.inscrire { background: green; color: white; }
.desinscrire { background: red; color: white; }
.admin { background: #444; color: white; }
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>PEXIORA POKER CLUB</h2>

<div id="compteur"></div>

<input id="nom" placeholder="Votre pseudo">

<button class="inscrire" onclick="inscrire()">Je m'inscris</button>
<button class="desinscrire" onclick="desinscrire()">Je me désinscris</button>

<h3>Inscrits</h3>
<div id="liste"></div>

<h3>Attente</h3>
<div id="attente"></div>

<hr>

<h3>Admin</h3>

<input type="password" id="adminCode" placeholder="Code admin">

<input type="number" id="nbPlaces" placeholder="Nombre de places">

<button class="admin" onclick="changerPlaces()">Mettre à jour les places</button>
<button class="admin" onclick="resetTournoi()">Réinitialiser tournoi</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDANUdOf2ui5gfuvdOMPfOX_SVaEcoT7-8",
  authDomain: "pexiora-poker-inscriptrions.firebaseapp.com",
  databaseURL: "https://pexiora-poker-inscriptrions-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pexiora-poker-inscriptrions"
};

firebase.initializeApp(firebaseConfig);
const ref = firebase.database().ref("joueurs");
const configRef = firebase.database().ref("config");

let joueurs = [];
let places = 64;

ref.on("value", snap => {
    joueurs = snap.val() || [];
    afficher();
});

configRef.on("value", snap => {
    let data = snap.val();
    if(data && data.places) places = data.places;
    afficher();
});

function norm(n){ return n.trim().toLowerCase(); }

function inscrire(){
    let nom = document.getElementById("nom").value.trim();
    if(!nom) return alert("Entre un pseudo");

    if(joueurs.some(j => norm(j) === norm(nom)))
        return alert("Déjà inscrit");

    joueurs.push(nom);
    ref.set(joueurs);

    localStorage.setItem("pseudo", nom);
}

function desinscrire(){
    let pseudo = localStorage.getItem("pseudo");
    if(!pseudo) return alert("Aucun pseudo mémorisé");

    joueurs = joueurs.filter(j => norm(j) !== norm(pseudo));
    ref.set(joueurs);

    localStorage.removeItem("pseudo");
}

function changerPlaces(){
    let code = document.getElementById("adminCode").value;
    let nb = parseInt(document.getElementById("nbPlaces").value);

    if(code !== "pexiora2026" && code !== "julien2026")
        return alert("Code incorrect");

    if(nb < 10 || nb > 200)
        return alert("Nombre invalide");

    configRef.set({places: nb});
    alert("Nombre de places mis à jour");
}

function resetTournoi(){
    let code = document.getElementById("adminCode").value;

    if(code !== "pexiora2026" && code !== "julien2026")
        return alert("Code incorrect");

    if(confirm("Réinitialiser ?")){
        ref.set([]);
    }
}

function afficher(){
    let ins = joueurs.slice(0, places);
    let att = joueurs.slice(places);

    let txt = ins.length + "/" + places;

    if(ins.length >= places) txt += " - COMPLET";

    document.getElementById("compteur").innerText = txt;

    document.getElementById("liste").innerHTML =
        ins.map((j,i)=>(i+1)+". "+j).join("<br>");

    document.getElementById("attente").innerHTML =
        att.map((j,i)=>(i+1)+". "+j).join("<br>");
}

window.onload = function(){
    let p = localStorage.getItem("pseudo");
    if(p) document.getElementById("nom").value = p;
}
</script>

</body>
</html>
